<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkChat | Workspace</title>
    <!-- Premium Bookerly-adjacent typography & high contrast styles -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Bookerly', 'Amazon Ember', 'Caecilia', Georgia, serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            border: 4px solid #000000;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            background: #ffffff;
        }
        .header {
            border-bottom: 2px solid #000000;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            border: 2px solid #000000;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-verifying {
            background-color: #000000;
            color: #ffffff;
        }
        .status-ready {
            background-color: #ffffff;
            color: #000000;
        }
        .chat-box {
            border: 2px solid #000000;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .message-bubble {
            margin-bottom: 12px;
            padding: 8px 12px;
            border: 1px solid #000000;
            font-size: 15px;
            line-height: 1.5;
        }
        .message-incoming {
            background-color: #ffffff;
        }
        .message-outgoing {
            background-color: #f0f0f0;
            border-left: 5px solid #000000;
        }
        .msg-meta {
            font-size: 11px;
            margin-bottom: 4px;
            color: #555555;
        }
        .msg-time {
            font-style: italic;
            float: right;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #000000;
            font-size: 16px;
            font-family: inherit;
        }
        .chat-input:focus {
            outline: none;
            background-color: #f7f7f7;
        }
        .send-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .send-btn:hover {
            background-color: #333333;
        }
        .send-btn:disabled, .chat-input:disabled {
            background-color: #e0e0e0;
            color: #888888;
            border-color: #888888;
            cursor: not-allowed;
        }
        .metadata-section {
            margin-top: 25px;
            font-size: 11px;
            border-top: 1px dashed #000000;
            padding-top: 15px;
            color: #555555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>InkChat</h1>
            <div id="badge" class="status-badge status-verifying">Security Handshake In Progress...</div>
        </div>

        <div id="chatBox" class="chat-box">
            <div class="message-bubble message-incoming">
                <strong>[System]</strong> Welcome to InkChat. Commencing hardware screening...
            </div>
        </div>

        <form id="chatForm" onsubmit="return handleMessageSubmit(event);">
            <div class="input-row">
                <input id="messageInput" type="text" class="chat-input" placeholder="Type a message to transmit..." disabled autocomplete="off">
                <button id="sendBtn" type="submit" class="send-btn" disabled>Send</button>
            </div>
        </form>

        <div class="metadata-section">
            <strong>My Session ID:</strong> <span id="userIdDisplay">Loading...</span><br>
            <strong>Active Device Token:</strong> <span id="deviceToken">Verifying...</span><br>
            <strong>E-Ink Optimization:</strong> Polling Engine active (5000ms loop). High contrast active.
        </div>
    </div>

    <!-- Include the strict ES5 telemetry gatekeeper -->
    <script src="kindle-telemetry.js" type="text/javascript"></script>

    <script type="text/javascript">
        var activeUserId = null;
        var activeDeviceFingerprint = null;
        var pollingIntervalId = null;

        // Session Cookie Utilities
        function getCookie(name) {
            var nameEQ = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }

        function setHardCookie(name, value) {
            var date = new Date();
            date.setFullYear(date.getFullYear() + 10);
            var expires = "; expires=" + date.toUTCString();
            document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Strict";
        }

        // Initialize session-based User ID
        activeUserId = getCookie("inkchat_user_id");
        if (!activeUserId) {
            // Generate a simple, unique user identifier
            activeUserId = "user_" + Math.floor(10000 + Math.random() * 90000);
            setHardCookie("inkchat_user_id", activeUserId);
        }
        document.getElementById("userIdDisplay").innerHTML = activeUserId;

        // Bind to custom event dispatched by kindle-telemetry.js
        if (window.addEventListener) {
            window.addEventListener("inkDeviceReady", function(e) {
                initializeChatWorkspace(e.detail.fingerprint);
            }, false);
        } else if (window.attachEvent) {
            window.attachEvent("oninkDeviceReady", function(e) {
                initializeChatWorkspace(e.detail.fingerprint);
            });
        }

        function initializeChatWorkspace(token) {
            activeDeviceFingerprint = token;

            // Update UI status badges
            var badge = document.getElementById("badge");
            badge.className = "status-badge status-ready";
            badge.innerHTML = "Secure Link Active";

            document.getElementById("deviceToken").innerHTML = token.substring(0, 15) + "...";

            // Map and bind the device to the User ID in Redis to lock it
            if (window.InkDeviceManager && typeof window.InkDeviceManager.registerCurrentDevice === "function") {
                window.InkDeviceManager.registerCurrentDevice(activeUserId, function(err, res) {
                    if (err) {
                        appendSystemMessage("Device registration lock failed. Session restricted.");
                        return;
                    }
                    
                    // Enable text input fields
                    document.getElementById("messageInput").removeAttribute("disabled");
                    document.getElementById("sendBtn").removeAttribute("disabled");
                    appendSystemMessage("Device registered. Multi-account policy check active.");

                    // Launch the 5-second polling engine
                    pollMessages();
                    pollingIntervalId = setInterval(pollMessages, 5000);
                });
            } else {
                // Fallback enabled
                document.getElementById("messageInput").removeAttribute("disabled");
                document.getElementById("sendBtn").removeAttribute("disabled");
                pollMessages();
                pollingIntervalId = setInterval(pollMessages, 5000);
            }
        }

        function appendSystemMessage(text) {
            var chatBox = document.getElementById("chatBox");
            var bubble = document.createElement("div");
            bubble.className = "message-bubble message-incoming";
            bubble.innerHTML = "<strong>[System]</strong> " + text;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // High-performance ES5 HTML escaping to prevent XSS
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        /**
         * E-Ink Polling Routine
         * Queries GET /api/get-messages every 5 seconds.
         */
        function pollMessages() {
            if (!window.InkChatEngine || typeof window.InkChatEngine.getMessages !== "function") {
                return;
            }

            window.InkChatEngine.getMessages(function(err, messages) {
                if (err) {
                    console.error("Failed to pull messages: " + err.message);
                    return;
                }

                var chatBox = document.getElementById("chatBox");
                var html = "";

                // Reverse the array to render in chronological order (oldest -> newest at bottom)
                var chronMessages = messages.slice().reverse();

                for (var i = 0; i < chronMessages.length; i++) {
                    try {
                        var msgObj = JSON.parse(chronMessages[i]);
                        var timeString = new Date(msgObj.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        
                        // Mask evaluation: determine if it's the current user sending
                        // The backend masks the User ID (e.g. user_12345 becomes user_1***5)
                        // We check if the masked ID matches our own masked ID or a standard match
                        var isMyOutgoing = false;
                        var myMasked = activeUserId.substring(0, 5) + "***" + activeUserId.substring(activeUserId.length - 2);
                        if (msgObj.userId === myMasked) {
                            isMyOutgoing = true;
                        }

                        var bubbleClass = isMyOutgoing ? "message-bubble message-outgoing" : "message-bubble message-incoming";

                        html += "<div class='" + bubbleClass + "'>" +
                                "<div class='msg-meta'>" +
                                "<strong>" + escapeHtml(msgObj.userId) + "</strong>" +
                                "<span class='msg-time'>" + timeString + "</span>" +
                                "</div>" +
                                "<div>" + escapeHtml(msgObj.text) + "</div>" +
                                "</div>";
                    } catch (e) {
                        // Skip corrupted frames
                    }
                }

                // If chat index differs, update DOM to limit screen ghosts
                if (html) {
                    chatBox.innerHTML = html;
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        /**
         * Core Message Transmission Routine
         */
        function handleMessageSubmit(event) {
            if (event.preventDefault) event.preventDefault();
            
            var input = document.getElementById("messageInput");
            var sendBtn = document.getElementById("sendBtn");
            var text = input.value.trim();
            if (!text) return false;

            // Lock inputs to prevent double clicks on slow e-ink touch modules
            input.disabled = true;
            sendBtn.disabled = true;

            if (window.InkChatEngine && typeof window.InkChatEngine.sendMessage === "function") {
                window.InkChatEngine.sendMessage(text, activeUserId, activeDeviceFingerprint, function(err, response) {
                    // Unlock fields
                    input.disabled = false;
                    sendBtn.disabled = false;

                    if (err) {
                        alert("Message dropped: Connection error.");
                        return;
                    }

                    if (response && response.status === "ERROR") {
                        alert(response.message || "Message blocked by safety filters.");
                        return;
                    }

                    // Clear and query immediately to keep UI highly responsive
                    input.value = "";
                    pollMessages();
                    input.focus();
                });
            } else {
                input.disabled = false;
                sendBtn.disabled = false;
            }

            return false;
        }
    </script>
</body>
</html>
