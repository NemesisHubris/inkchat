<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkChat | Workspace</title>
    <!-- Premium Bookerly-adjacent typography & high contrast styles -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Bookerly', 'Amazon Ember', 'Caecilia', Georgia, serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            border: 4px solid #000000;
            width: 100%;
            max-width: 600px;
            padding: 25px;
            background: #ffffff;
        }
        .header {
            border-bottom: 2px solid #000000;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            border: 2px solid #000000;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-verifying {
            background-color: #000000;
            color: #ffffff;
        }
        .status-ready {
            background-color: #ffffff;
            color: #000000;
        }
        .chat-box {
            border: 2px solid #000000;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        .message-bubble {
            margin-bottom: 12px;
            padding: 8px 12px;
            border: 1px solid #000000;
            font-size: 15px;
            line-height: 1.5;
        }
        .message-incoming {
            background-color: #ffffff;
        }
        .message-outgoing {
            background-color: #f0f0f0;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #000000;
            font-size: 16px;
            font-family: inherit;
        }
        .chat-input:focus {
            outline: none;
            background-color: #f7f7f7;
        }
        .send-btn {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        .send-btn:hover {
            background-color: #333333;
        }
        .metadata-section {
            margin-top: 25px;
            font-size: 11px;
            border-top: 1px dashed #000000;
            padding-top: 15px;
            color: #555555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>InkChat</h1>
            <div id="badge" class="status-badge status-verifying">Security Handshake In Progress...</div>
        </div>

        <div id="chatBox" class="chat-box">
            <div class="message-bubble message-incoming">
                <strong>[System]</strong> Welcome to InkChat. Generating hardware parameters and validating device state...
            </div>
        </div>

        <form id="chatForm" onsubmit="return handleMessageSubmit(event);">
            <div class="input-row">
                <input id="messageInput" type="text" class="chat-input" placeholder="Type a message to transmit..." disabled autocomplete="off">
                <button id="sendBtn" type="submit" class="send-btn" disabled>Send</button>
            </div>
        </form>

        <div class="metadata-section">
            <strong>Active Device Token:</strong> <span id="deviceToken">Verifying...</span><br>
            <strong>E-Ink Optimization:</strong> High Contrast Layout Active (Low Refresh Rate Compatible).
        </div>
    </div>

    <!-- Include the strict ES5 telemetry gatekeeper -->
    <script src="kindle-telemetry.js" type="text/javascript"></script>

    <script type="text/javascript">
        // Bind to the custom handshake verification event fired by kindle-telemetry.js
        if (window.addEventListener) {
            window.addEventListener("inkDeviceReady", function(e) {
                initializeChatWorkspace(e.detail.fingerprint);
            }, false);
        } else if (window.attachEvent) {
            window.attachEvent("oninkDeviceReady", function(e) {
                initializeChatWorkspace(e.detail.fingerprint);
            });
        }

        function initializeChatWorkspace(token) {
            // Update UI status badges
            var badge = document.getElementById("badge");
            badge.className = "status-badge status-ready";
            badge.innerHTML = "Secure Link Active";

            document.getElementById("deviceToken").innerHTML = token;

            // Enable text input fields
            document.getElementById("messageInput").removeAttribute("disabled");
            document.getElementById("sendBtn").removeAttribute("disabled");

            appendSystemMessage("Secure hardware signature established and approved by edge proxy gatekeeper.");
        }

        function appendSystemMessage(text) {
            var chatBox = document.getElementById("chatBox");
            var bubble = document.createElement("div");
            bubble.className = "message-bubble message-incoming";
            bubble.innerHTML = "<strong>[System]</strong> " + text;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendUserMessage(text) {
            var chatBox = document.getElementById("chatBox");
            var bubble = document.createElement("div");
            bubble.className = "message-bubble message-outgoing";
            bubble.innerHTML = "<strong>[You]</strong> " + text;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleMessageSubmit(event) {
            if (event.preventDefault) event.preventDefault();
            
            var input = document.getElementById("messageInput");
            var text = input.value.trim();
            if (!text) return false;

            // Intercept message release and route it through the ES5 standalone moderation interceptor
            if (window.InkModerationShield && typeof window.InkModerationShield.moderate === "function") {
                window.InkModerationShield.moderate(text, function() {
                    // SUCCESS callback (cleared by safety model)
                    appendUserMessage(text);
                    input.value = "";
                }, function(reason) {
                    // FAILURE callback
                    console.warn("Input dropped by moderation shield: " + reason);
                });
            } else {
                // Fallback direct release (if telemetry is inactive/bypassed)
                appendUserMessage(text);
                input.value = "";
            }

            return false;
        }
    </script>
</body>
</html>
