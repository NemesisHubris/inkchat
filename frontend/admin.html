<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkChat Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0d1117;
            --surface:  #161b22;
            --border:   #30363d;
            --text:     #e6edf3;
            --muted:    #8b949e;
            --red:      #f85149;
            --green:    #3fb950;
            --blue:     #58a6ff;
            --yellow:   #d29922;
            --purple:   #a371f7;
        }

        body {
            font-family: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.5;
        }

        /* ── Login ── */
        #auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 360px;
            padding: 32px;
        }
        .login-box h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
            letter-spacing: 0.3px;
        }
        .login-box p { color: var(--muted); font-size: 12px; margin-bottom: 24px; }

        /* ── Form elements ── */
        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .admin-input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font: inherit;
            font-size: 13px;
            outline: none;
            margin-bottom: 16px;
        }
        .admin-input:focus { border-color: var(--blue); }
        .admin-input::placeholder { color: var(--muted); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:hover { border-color: var(--blue); color: var(--blue); }
        .btn:active { opacity: 0.7; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--blue); border-color: var(--blue); color: #000; }
        .btn-primary:hover { opacity: 0.85; color: #000; }
        .btn-danger  { background: transparent; border-color: var(--red); color: var(--red); }
        .btn-danger:hover  { background: var(--red); color: #fff; }
        .btn-warn    { background: transparent; border-color: var(--yellow); color: var(--yellow); }
        .btn-warn:hover    { background: var(--yellow); color: #000; }
        .btn-muted   { background: transparent; border-color: var(--purple); color: var(--purple); }
        .btn-muted:hover   { background: var(--purple); color: #fff; }
        .btn-full    { width: 100%; }
        .btn-sm      { padding: 4px 10px; font-size: 11px; }

        .error-msg {
            display: none;
            padding: 8px 10px;
            border: 1px solid var(--red);
            background: rgba(248, 81, 73, 0.08);
            color: var(--red);
            font-size: 12px;
            margin-top: 12px;
        }

        /* ── Dashboard ── */
        #dashboard {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .top-bar-left { display: flex; align-items: center; gap: 12px; }
        .top-bar h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
        .session-pill {
            padding: 2px 8px;
            border: 1px solid var(--green);
            color: var(--green);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .main-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 280px;
            gap: 0;
            overflow: hidden;
        }

        .col {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .col:last-child { border-right: none; }

        .col-header {
            flex-shrink: 0;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .col-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }
        .col-body::-webkit-scrollbar { width: 4px; }
        .col-body::-webkit-scrollbar-thumb { background: var(--border); }

        /* ── User lookup ── */
        .search-row { display: flex; gap: 6px; margin-bottom: 14px; }
        .search-row .admin-input { margin-bottom: 0; flex: 1; }

        .user-card { display: none; }

        .user-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }
        .user-card-name { font-size: 15px; font-weight: 700; }
        .tag {
            padding: 2px 7px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }
        .tag-active  { border-color: var(--green);  color: var(--green); }
        .tag-banned  { border-color: var(--red);    color: var(--red); }
        .tag-muted   { border-color: var(--yellow); color: var(--yellow); }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(48,54,61,0.5);
            font-size: 12px;
        }
        .stat-label { color: var(--muted); }
        .stat-val   { font-weight: 600; font-family: inherit; }

        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            margin: 12px 0 6px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            margin-bottom: 4px;
            gap: 8px;
        }
        .list-item-main { flex: 1; min-width: 0; }
        .list-item-addr { font-size: 12px; font-family: inherit; }
        .list-item-geo  { font-size: 11px; color: var(--muted); margin-top: 1px; }
        .list-item-hash { font-size: 11px; word-break: break-all; color: var(--muted); }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        /* ── Chat feed ── */
        #chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #chat-feed::-webkit-scrollbar { width: 4px; }
        #chat-feed::-webkit-scrollbar-thumb { background: var(--border); }

        .chat-msg {
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: 2px solid var(--border);
        }
        .chat-msg.admin-msg { border-left-color: var(--purple); }
        .chat-msg-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3px;
        }
        .chat-msg-user { font-weight: 700; font-size: 12px; }
        .chat-msg-user.admin-user { color: var(--purple); }
        .chat-msg-time { font-size: 10px; color: var(--muted); }
        .chat-msg-text { font-size: 13px; word-break: break-word; }
        .chat-msg-actions { display: flex; gap: 6px; margin-top: 6px; }

        .chat-input-bar {
            flex-shrink: 0;
            display: flex;
            gap: 6px;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
        }
        .chat-input-bar .admin-input { margin-bottom: 0; flex: 1; }

        /* ── Quick actions ── */
        .ban-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        .ban-tab {
            flex: 1;
            padding: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--muted);
            font: inherit;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-align: center;
        }
        .ban-tab.active { border-color: var(--red); color: var(--red); background: rgba(248,81,73,0.08); }

        /* ── Center tabs ── */
        .center-tab {
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            font: inherit;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            cursor: pointer;
        }
        .center-tab.active { color: var(--text); border-bottom: 2px solid var(--blue); }
        .center-tab:hover  { color: var(--text); }

        /* ── Topic admin rows ── */
        .admin-topic-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            gap: 8px;
        }
        .admin-topic-info { flex: 1; min-width: 0; }
        .admin-topic-name { font-size: 13px; font-weight: 600; word-break: break-word; }
        .admin-topic-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── Leaderboard ── */
        .lb-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(48,54,61,0.4);
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-user  { color: var(--blue); }
        .lb-count { color: var(--red); font-weight: 700; }

        /* ── Activity log ── */
        #activity-log {
            font-size: 11px;
            color: var(--green);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 10px;
            height: 180px;
            overflow-y: auto;
            font-family: inherit;
            line-height: 1.6;
        }
        #activity-log::-webkit-scrollbar { width: 4px; }
        #activity-log::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

<!-- ── Login ── -->
<div id="auth-screen">
    <div class="login-box">
        <h1>InkChat Admin</h1>
        <p>Restricted access. Admins only.</p>
        <form onsubmit="return handleAdminAuth(event)">
            <label class="field-label" for="adminPassword">Password</label>
            <input type="password" id="adminPassword" class="admin-input" placeholder="••••••••" required autocomplete="off">
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            <div id="authErrorMsg" class="error-msg"></div>
        </form>
    </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">

    <div class="top-bar">
        <div class="top-bar-left">
            <h1>InkChat Admin</h1>
            <div class="session-pill">Session Active</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="endAdminSession()">Sign Out</button>
    </div>

    <div class="main-grid">

        <!-- Left: User lookup -->
        <div class="col">
            <div class="col-header">User Lookup</div>
            <div class="col-body">
                <div class="search-row">
                    <input type="text" id="lookupUser" class="admin-input" placeholder="Username…" autocomplete="off"
                        onkeydown="if(event.keyCode===13) investigateUser()">
                    <button class="btn" onclick="investigateUser()">Look up</button>
                </div>

                <div id="resultCard" class="user-card">
                    <div class="user-card-header">
                        <span id="resUsername" class="user-card-name"></span>
                        <span id="resStatus" class="tag"></span>
                    </div>

                    <div class="stat-row">
                        <span class="stat-label">Active sessions</span>
                        <span id="sessionCount" class="stat-val">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Blocked messages (strikes)</span>
                        <span id="strikeCount" class="stat-val" style="color:var(--red);">0</span>
                    </div>

                    <div class="section-title">Linked Devices</div>
                    <div id="resDevices"></div>

                    <div class="section-title">Linked IPs</div>
                    <div id="resIps"></div>

                    <div class="action-row" id="userActions">
                        <button id="banAccountBtn"     class="btn btn-danger btn-sm">Ban Account</button>
                        <button id="muteAccountBtn"    class="btn btn-warn btn-sm">Mute</button>
                        <button id="resetPasswordBtn"  class="btn btn-muted btn-sm">Reset Password</button>
                        <button id="revokeSessionsBtn" class="btn btn-sm">Revoke Sessions</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Center: Chat feed + Topics -->
        <div class="col" style="border-right:none;">
            <div class="col-header" style="padding:0;">
                <button id="center-tab-chat"    class="center-tab active" onclick="setCenterTab('chat')">Live Chat</button>
                <button id="center-tab-topics"  class="center-tab"        onclick="setCenterTab('topics')">Topics</button>
                <button id="center-tab-blocked" class="center-tab"        onclick="setCenterTab('blocked')">Blocked Log</button>
                <button id="center-tab-signins" class="center-tab"        onclick="setCenterTab('signins')">Sign-ins</button>
                <div style="flex:1;"></div>
                <button id="chat-purge-btn" class="btn btn-danger btn-sm" style="margin-right:8px;" onclick="purgeAllMessagesConfirm()">Purge All</button>
            </div>

            <!-- Chat panel -->
            <div id="center-chat" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
                <div id="chat-feed"></div>
                <div class="chat-input-bar">
                    <input type="text" id="adminChatMessage" class="admin-input"
                        placeholder="Send as Admin…"
                        onkeydown="if(event.keyCode===13) transmitAdminMessage()"
                        autocomplete="off">
                    <button class="btn btn-primary" onclick="transmitAdminMessage()">Send</button>
                </div>
            </div>

            <!-- Blocked messages panel -->
            <div id="center-blocked" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
                <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
                    <span style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Last 200 blocked attempts</span>
                    <button class="btn btn-sm" onclick="loadBlockedMessages()">Refresh</button>
                </div>
                <div id="blocked-messages-list" style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;"></div>
            </div>

            <!-- Sign-ins panel -->
            <div id="center-signins" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
                <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
                    <span style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Last 200 sign-ins</span>
                    <button class="btn btn-sm" onclick="loadSignInLog()">Refresh</button>
                </div>
                <div id="signin-log-list" style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;"></div>
            </div>

            <!-- Topics panel -->
            <div id="center-topics" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
                <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;">
                    <input type="text" id="admin-topic-search" class="admin-input" placeholder="Search topics…" style="margin:0;flex:1;" onkeyup="adminTopicSearch()">
                    <button class="btn" onclick="adminLoadTopics()">Refresh</button>
                </div>
                <div id="admin-topics-list" style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;"></div>
            </div>
        </div>

        <!-- Right: Quick ban + leaderboard + log -->
        <div class="col">
            <div class="col-header">Quick Ban</div>
            <div class="col-body" style="display:flex;flex-direction:column;gap:0;">
                <div class="ban-tabs">
                    <button id="typeAccount" class="ban-tab active" onclick="setBanType('account')">Account</button>
                    <button id="typeDevice"  class="ban-tab"        onclick="setBanType('device')">Device</button>
                    <button id="typeIp"      class="ban-tab"        onclick="setBanType('ip')">IP</button>
                </div>

                <label id="targetLabel" class="field-label">Username</label>
                <input type="text" id="banTarget" class="admin-input" placeholder="Target…" autocomplete="off">
                <button class="btn btn-danger btn-full" onclick="executeBanDirect()">Ban</button>

                <div class="section-title" style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;">
                    Strikes Leaderboard
                    <button class="btn btn-sm" onclick="loadLeaderboard()" style="font-size:10px;">Refresh</button>
                </div>
                <div id="leaderboard-list" style="background:var(--bg);border:1px solid var(--border);padding:6px 8px;max-height:160px;overflow-y:auto;font-size:11px;"></div>

                <div class="section-title" style="margin-top:12px;">Activity Log</div>
                <div id="activity-log">&gt; Admin session started.</div>
            </div>
        </div>

    </div>
</div>

<script>
    var adminToken = "";
    var activeBanType = "account";
    var isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    var API = isLocal ? "http://localhost:8787" : "https://slatechat-proxy.kindlemodshelf.workers.dev";
    var chatPollId = null;
    var lastMsgHash = "";

    // ── Auth ──────────────────────────────────────────────────────────────────

    window.onload = function() { restoreAdminSession(); };

    function buildHeaders(extra) {
        var h = Object.assign({ "Content-Type": "application/json" }, extra || {});
        if (adminToken) h["X-Admin-Token"] = adminToken;
        return h;
    }

    function restoreAdminSession() {
        fetch(API + "/api/admin/session", { method: "GET", credentials: "include" })
            .then(function(r) { return r.json(); })
            .then(function(d) { if (d && d.authenticated) showDashboard(); })
            .catch(function() {});
    }

    function handleAdminAuth(e) {
        if (e.preventDefault) e.preventDefault();
        var pass = document.getElementById("adminPassword").value;
        var err  = document.getElementById("authErrorMsg");
        err.style.display = "none";

        fetch(API + "/api/admin/login", {
            method: "POST", credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pass })
        })
        .then(function(r) {
            return r.json().then(function(d) {
                if (r.status !== 200) throw new Error(d.message || "Wrong password.");
                return d;
            });
        })
        .then(function(d) {
            if (d.status === "SUCCESS") {
                adminToken = d.token || "";
                showDashboard();
                log("Signed in.");
            } else {
                throw new Error("Login failed.");
            }
        })
        .catch(function(e) {
            err.textContent = e.message;
            err.style.display = "block";
        });
        return false;
    }

    function showDashboard() {
        document.getElementById("auth-screen").style.display  = "none";
        document.getElementById("dashboard").style.display    = "flex";
        startChatPoll();
        loadLeaderboard();
    }

    function endAdminSession() {
        fetch(API + "/api/logout", {
            method: "POST", credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ adminToken: adminToken })
        }).finally(function() { location.reload(); });
    }

    // ── Activity log ──────────────────────────────────────────────────────────

    function log(msg) {
        var el = document.getElementById("activity-log");
        var t  = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        var line = document.createElement("div");
        line.textContent = "> [" + t + "] " + msg;
        el.appendChild(line);
        el.scrollTop = el.scrollHeight;
    }

    // ── User lookup ───────────────────────────────────────────────────────────

    function investigateUser() {
        var u = document.getElementById("lookupUser").value.trim();
        if (!u) return;
        fetch(API + "/api/admin/user-lookup?username=" + encodeURIComponent(u), {
            method: "GET", credentials: "include", headers: buildHeaders({})
        })
        .then(function(r) {
            return r.json().then(function(d) {
                if (r.status !== 200) throw new Error(d.message || "Lookup failed.");
                return d;
            });
        })
        .then(function(d) {
            if (d.status === "SUCCESS") { renderUser(d); log("Looked up: " + u); }
            else throw new Error("Unexpected response.");
        })
        .catch(function(e) { log("Error: " + e.message); alert(e.message); });
    }

    function renderUser(d) {
        document.getElementById("resUsername").textContent = d.username;
        document.getElementById("sessionCount").textContent = d.activeSessions || 0;
        document.getElementById("strikeCount").textContent  = d.strikes || 0;

        var st = document.getElementById("resStatus");
        st.textContent  = d.banned ? "Banned" : "Active";
        st.className    = "tag " + (d.banned ? "tag-banned" : "tag-active");

        // Devices
        var devEl = document.getElementById("resDevices");
        devEl.innerHTML = "";
        if (!d.linkedDevices || !d.linkedDevices.length) {
            devEl.innerHTML = "<div style='color:var(--muted);font-size:12px;'>None</div>";
        } else {
            for (var i = 0; i < d.linkedDevices.length; i++) {
                var dev = d.linkedDevices[i];
                var row = document.createElement("div");
                row.className = "list-item";
                var span = document.createElement("span");
                span.className = "list-item-hash";
                span.title = dev;
                span.textContent = dev.substring(0, 20) + "…";
                var btn = document.createElement("button");
                btn.className = "btn btn-danger btn-sm";
                btn.textContent = "Ban";
                (function(dd) {
                    btn.onclick = function() {
                        if (confirm("Ban device fingerprint: " + dd + "?")) banTarget("device", dd);
                    };
                })(dev);
                row.appendChild(span);
                row.appendChild(btn);
                devEl.appendChild(row);
            }
        }

        // IPs
        var ipEl = document.getElementById("resIps");
        ipEl.innerHTML = "";
        if (!d.linkedIps || !d.linkedIps.length) {
            ipEl.innerHTML = "<div style='color:var(--muted);font-size:12px;'>None</div>";
        } else {
            for (var j = 0; j < d.linkedIps.length; j++) {
                var ipObj = d.linkedIps[j];
                var geo   = ipObj.geo || {};
                var geoStr = [geo.city, geo.region, geo.country].filter(Boolean).join(", ") || "Unknown location";
                if (geo.org) geoStr += " · " + geo.org;

                var row2 = document.createElement("div");
                row2.className = "list-item";
                row2.style.flexDirection = "column";
                row2.style.alignItems    = "stretch";

                var top = document.createElement("div");
                top.style.cssText = "display:flex;justify-content:space-between;align-items:center;";
                var addr = document.createElement("span");
                addr.className = "list-item-addr";
                addr.textContent = ipObj.ip;
                var btn2 = document.createElement("button");
                btn2.className = "btn btn-danger btn-sm";
                btn2.textContent = "Ban IP";
                (function(ip) {
                    btn2.onclick = function() {
                        if (confirm("Ban IP: " + ip + "?")) banTarget("ip", ip);
                    };
                })(ipObj.ip);
                top.appendChild(addr);
                top.appendChild(btn2);

                var geoDiv = document.createElement("div");
                geoDiv.className = "list-item-geo";
                geoDiv.textContent = geoStr;

                row2.appendChild(top);
                row2.appendChild(geoDiv);
                ipEl.appendChild(row2);
            }
        }

        // Actions
        var actions = document.getElementById("userActions");
        actions.style.display = d.banned ? "none" : "flex";

        document.getElementById("banAccountBtn").onclick = function() {
            if (confirm("Permanently ban account \"" + d.username + "\"?")) banTarget("account", d.username);
        };
        document.getElementById("muteAccountBtn").onclick = function() { muteUserPrompt(d.username); };
        document.getElementById("resetPasswordBtn").onclick = function() { resetUserPasswordPrompt(d.username); };
        document.getElementById("revokeSessionsBtn").onclick = function() {
            if (confirm("Revoke all sessions for \"" + d.username + "\"?")) revokeUserSessions(d.username);
        };

        document.getElementById("resultCard").style.display = "block";
    }

    // ── Ban ───────────────────────────────────────────────────────────────────

    function setBanType(t) {
        activeBanType = t;
        ["account","device","ip"].forEach(function(id) {
            document.getElementById("type" + id.charAt(0).toUpperCase() + id.slice(1)).className =
                "ban-tab" + (id === t ? " active" : "");
        });
        var labels = { account: "Username", device: "Device Fingerprint", ip: "IP Address" };
        var placeholders = { account: "e.g. bob", device: "Fingerprint hash…", ip: "e.g. 1.2.3.4" };
        document.getElementById("targetLabel").textContent = labels[t];
        document.getElementById("banTarget").placeholder  = placeholders[t];
    }

    function banTarget(type, target) {
        fetch(API + "/api/admin/ban", {
            method: "POST", credentials: "include",
            headers: buildHeaders(),
            body: JSON.stringify({ type: type, target: target })
        })
        .then(function(r) {
            return r.json().then(function(d) {
                if (r.status !== 200) throw new Error(d.message || "Ban failed.");
                return d;
            });
        })
        .then(function(d) {
            log(d.message || "Banned " + type + ": " + target);
            investigateUser();
        })
        .catch(function(e) { log("Ban error: " + e.message); alert(e.message); });
    }

    function executeBanDirect() {
        var target = document.getElementById("banTarget").value.trim();
        if (!target) return;
        if (confirm("Ban " + activeBanType + ": " + target + "?")) {
            banTarget(activeBanType, target);
            document.getElementById("banTarget").value = "";
        }
    }

    // ── Mute ──────────────────────────────────────────────────────────────────

    function muteUserPrompt(defaultUser) {
        var u = prompt("Username to mute:", defaultUser || "");
        if (!u) return;
        var s = prompt("Mute duration in seconds (e.g. 300 = 5 min, 3600 = 1 hr):", "300");
        if (!s) return;
        var secs = parseInt(s, 10);
        if (isNaN(secs) || secs <= 0) { alert("Invalid duration."); return; }
        fetch(API + "/api/admin/mute-user", {
            method: "POST", credentials: "include",
            headers: buildHeaders(),
            body: JSON.stringify({ username: u, durationSeconds: secs })
        })
        .then(function(r) {
            return r.json().then(function(d) {
                if (r.status !== 200) throw new Error(d.message || "Mute failed.");
                return d;
            });
        })
        .then(function(d) { log("Muted " + u + " for " + secs + "s."); alert(d.message || "User muted."); })
        .catch(function(e) { log("Mute error: " + e.message); alert(e.message); });
    }

    // ── Password reset ────────────────────────────────────────────────────────

    function resetUserPasswordPrompt(u) {
        var p = prompt("New password for \"" + u + "\" (min 4 chars):");
        if (!p) return;
        if (p.length < 4) { alert("Password too short."); return; }
        fetch(API + "/api/admin/reset-password", {
            method: "POST", credentials: "include",
            headers: buildHeaders(),
            body: JSON.stringify({ username: u, newPassword: p })
        })
        .then(function(r) {
            return r.json().then(function(d) {
                if (r.status !== 200) throw new Error(d.message || "Reset failed.");
                return d;
            });
        })
        .then(function(d) { log("Reset password for " + u + "."); alert(d.message || "Password reset."); })
        .catch(function(e) { log("Reset error: " + e.message); alert(e.message); });
    }

    // ── Revoke sessions ───────────────────────────────────────────────────────

    function revokeUserSessions(u) {
        fetch(API + "/api/admin/revoke-sessions", {
            method: "POST", credentials: "include",
            headers: buildHeaders(),
            body: JSON.stringify({ username: u })
        })
        .then(function(r) {
            return r.json().then(function(d) {
                if (r.status !== 200) throw new Error(d.message || "Revoke failed.");
                return d;
            });
        })
        .then(function(d) { log(d.message || "Revoked sessions for " + u); alert(d.message || "Done."); investigateUser(); })
        .catch(function(e) { log("Revoke error: " + e.message); alert(e.message); });
    }

    // ── Chat ──────────────────────────────────────────────────────────────────

    function startChatPoll() {
        pollChat();
        chatPollId = setInterval(pollChat, 4000);
    }

    function pollChat() {
        fetch(API + "/api/get-messages", { method: "GET", credentials: "include" })
            .then(function(r) { return r.json(); })
            .then(function(msgs) {
                if (!Array.isArray(msgs)) return;
                var h = msgs.join("|");
                if (h === lastMsgHash) return;
                lastMsgHash = h;
                renderChat(msgs.slice().reverse());
            })
            .catch(function() {});
    }

    function renderChat(msgs) {
        var feed = document.getElementById("chat-feed");
        var atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 40;
        feed.innerHTML = "";
        for (var i = 0; i < msgs.length; i++) {
            var m;
            try { m = JSON.parse(msgs[i]); } catch(e) { continue; }
            var isAdmin = m.role === "admin";
            var t = new Date(m.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

            var div = document.createElement("div");
            div.className = "chat-msg" + (isAdmin ? " admin-msg" : "");

            var meta = document.createElement("div");
            meta.className = "chat-msg-meta";
            var user = document.createElement("span");
            user.className = "chat-msg-user" + (isAdmin ? " admin-user" : "");
            user.textContent = m.userId;
            var time = document.createElement("span");
            time.className = "chat-msg-time";
            time.textContent = t;
            meta.appendChild(user);
            meta.appendChild(time);

            var text = document.createElement("div");
            text.className = "chat-msg-text";
            text.textContent = m.text;

            var acts = document.createElement("div");
            acts.className = "chat-msg-actions";
            var delBtn = document.createElement("button");
            delBtn.className = "btn btn-danger btn-sm";
            delBtn.textContent = "Delete";
            (function(raw) {
                delBtn.onclick = function() {
                    if (confirm("Delete this message?")) deleteMessage(raw);
                };
            })(msgs[i]);
            acts.appendChild(delBtn);

            if (!isAdmin) {
                var muteBtn = document.createElement("button");
                muteBtn.className = "btn btn-warn btn-sm";
                muteBtn.textContent = "Mute";
                (function(uid) {
                    muteBtn.onclick = function() { muteUserPrompt(uid); };
                })(m.userId);
                acts.appendChild(muteBtn);
            }

            div.appendChild(meta);
            div.appendChild(text);
            div.appendChild(acts);
            feed.appendChild(div);
        }
        if (atBottom) feed.scrollTop = feed.scrollHeight;
    }

    function transmitAdminMessage() {
        var inp = document.getElementById("adminChatMessage");
        var text = inp.value.trim();
        if (!text) return;
        inp.disabled = true;
        fetch(API + "/api/send-message", {
            method: "POST", credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text, sessionToken: adminToken, ink_device_id: "admin-console-bypass" })
        })
        .then(function(r) {
            inp.disabled = false;
            if (r.status === 200) { inp.value = ""; pollChat(); inp.focus(); }
            else return r.json().then(function(d) { throw new Error(d.message || "Send failed."); });
        })
        .catch(function(e) { inp.disabled = false; alert(e.message); });
    }

    function deleteMessage(raw) {
        fetch(API + "/api/admin/delete-message", {
            method: "POST", credentials: "include",
            headers: buildHeaders(),
            body: JSON.stringify({ messageRaw: raw })
        })
        .then(function(r) {
            if (r.status === 200) {
                try { log("Deleted: " + JSON.parse(raw).text.substring(0, 40)); } catch(e) {}
                pollChat();
            } else {
                return r.json().then(function(d) { throw new Error(d.message || "Delete failed."); });
            }
        })
        .catch(function(e) { log("Delete error: " + e.message); alert(e.message); });
    }

    function purgeAllMessagesConfirm() {
        if (!confirm("Delete ALL messages? This cannot be undone.")) return;
        if (!confirm("Are you sure? All chat history will be permanently erased.")) return;
        fetch(API + "/api/admin/purge-messages", {
            method: "POST", credentials: "include", headers: buildHeaders()
        })
        .then(function(r) {
            if (r.status === 200) { log("All messages purged."); pollChat(); }
            else return r.json().then(function(d) { throw new Error(d.message || "Purge failed."); });
        })
        .catch(function(e) { log("Purge error: " + e.message); alert(e.message); });
    }

    // ── Center tab switching ──────────────────────────────────────────────────

    function setCenterTab(tab) {
        ["chat","topics","blocked","signins"].forEach(function(t) {
            document.getElementById("center-tab-" + t).classList.toggle("active", t === tab);
        });
        document.getElementById("chat-purge-btn").style.display   = tab === "chat"    ? "" : "none";
        document.getElementById("center-chat").style.display      = tab === "chat"    ? "flex" : "none";
        document.getElementById("center-topics").style.display    = tab === "topics"  ? "flex" : "none";
        document.getElementById("center-blocked").style.display   = tab === "blocked" ? "flex" : "none";
        document.getElementById("center-signins").style.display   = tab === "signins" ? "flex" : "none";
        if (tab === "topics")  adminLoadTopics();
        if (tab === "blocked") loadBlockedMessages();
        if (tab === "signins") loadSignInLog();
    }

    // ── Blocked messages log ──────────────────────────────────────────────────

    var REASON_COLOR = { SEXUAL: "var(--red)", VIOLENCE: "var(--red)", HATE: "var(--yellow)", SELF_HARM: "var(--purple)", POLICY: "var(--muted)" };

    function loadBlockedMessages() {
        var listEl = document.getElementById("blocked-messages-list");
        listEl.innerHTML = "<div style='color:var(--muted);font-size:12px;'>Loading…</div>";

        fetch(API + "/api/admin/blocked-messages", {
            method: "GET", credentials: "include", headers: buildHeaders({})
        })
        .then(function(r) { return r.json(); })
        .then(function(list) {
            listEl.innerHTML = "";
            if (!Array.isArray(list) || !list.length) {
                listEl.innerHTML = "<div style='color:var(--muted);font-size:12px;padding:20px 0;text-align:center;'>No blocked messages recorded.</div>";
                return;
            }
            for (var i = 0; i < list.length; i++) {
                (function(item) {
                    var t  = new Date(item.timestamp).toLocaleString([], { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
                    var rc = REASON_COLOR[item.reason] || REASON_COLOR.POLICY;

                    var ctx = item.context === "general"    ? "General Chat"
                            : item.context === "topic_name" ? "Topic Name"
                            : "Topic " + item.context;

                    var row = document.createElement("div");
                    row.style.cssText = "background:var(--bg);border:1px solid var(--border);border-left:3px solid " + rc + ";padding:8px 10px;";

                    var meta = document.createElement("div");
                    meta.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;";
                    meta.innerHTML =
                        "<span style='font-weight:700;font-size:12px;color:var(--blue);cursor:pointer;' onclick='document.getElementById(\"lookupUser\").value=\"" + escAttr(item.userId) + "\";investigateUser();'>@" + escHtml(item.userId) + "</span>" +
                        "<span style='font-size:10px;font-weight:700;color:" + rc + ";border:1px solid " + rc + ";padding:1px 5px;'>" + escHtml(item.reason || 'POLICY') + "</span>" +
                        "<span style='font-size:10px;color:var(--muted);border:1px solid var(--border);padding:1px 5px;'>" + escHtml(ctx) + "</span>" +
                        "<span style='font-size:10px;color:var(--muted);margin-left:auto;'>" + t + "</span>";

                    var txt = document.createElement("div");
                    txt.style.cssText = "font-size:13px;word-break:break-word;color:var(--text);opacity:0.85;";
                    txt.textContent = item.text;

                    row.appendChild(meta);
                    row.appendChild(txt);
                    listEl.appendChild(row);
                })(list[i]);
            }
        })
        .catch(function(e) {
            document.getElementById("blocked-messages-list").innerHTML =
                "<div style='color:var(--red);font-size:12px;'>Error: " + e.message + "</div>";
        });
    }

    function escHtml(s) {
        var d = document.createElement("div");
        d.textContent = String(s || "");
        return d.innerHTML;
    }
    function escAttr(s) { return String(s || "").replace(/"/g, "&quot;"); }

    // ── Topics management ─────────────────────────────────────────────────────

    var adminTopicSearchTimer = null;

    function adminTopicSearch() {
        if (adminTopicSearchTimer) clearTimeout(adminTopicSearchTimer);
        adminTopicSearchTimer = setTimeout(adminLoadTopics, 300);
    }

    function adminLoadTopics() {
        var q = (document.getElementById("admin-topic-search").value || "").trim();
        var listEl = document.getElementById("admin-topics-list");
        listEl.innerHTML = "<div style='color:var(--muted);font-size:12px;'>Loading…</div>";

        fetch(API + "/api/admin/topics" + (q ? "?q=" + encodeURIComponent(q) : ""), {
            method: "GET", credentials: "include", headers: buildHeaders({})
        })
        .then(function(r) { return r.json(); })
        .then(function(topics) {
            listEl.innerHTML = "";
            if (!Array.isArray(topics) || !topics.length) {
                listEl.innerHTML = "<div style='color:var(--muted);font-size:12px;padding:10px 0;'>No topics found.</div>";
                return;
            }
            for (var i = 0; i < topics.length; i++) {
                (function(t) {
                    var d = document.createElement("div");
                    d.className = "admin-topic-row";

                    var info = document.createElement("div");
                    info.className = "admin-topic-info";
                    var name = document.createElement("div");
                    name.className = "admin-topic-name";
                    name.textContent = t.name;
                    var meta = document.createElement("div");
                    meta.className = "admin-topic-meta";
                    meta.textContent = "by @" + t.creator + " · " + t.msg_count + " messages · " + new Date(t.created_at).toLocaleDateString();
                    info.appendChild(name);
                    info.appendChild(meta);

                    var delBtn = document.createElement("button");
                    delBtn.className = "btn btn-danger btn-sm";
                    delBtn.textContent = "Delete";
                    delBtn.onclick = function() {
                        if (!confirm("Delete topic \"" + t.name + "\" and all its messages?")) return;
                        fetch(API + "/api/topics/" + encodeURIComponent(t.id), {
                            method: "DELETE", credentials: "include", headers: buildHeaders({})
                        })
                        .then(function(r) {
                            if (r.status === 200) { log("Deleted topic: " + t.name); adminLoadTopics(); }
                            else return r.json().then(function(d) { throw new Error(d.message || "Delete failed."); });
                        })
                        .catch(function(e) { log("Topic delete error: " + e.message); alert(e.message); });
                    };

                    d.appendChild(info);
                    d.appendChild(delBtn);
                    listEl.appendChild(d);
                })(topics[i]);
            }
        })
        .catch(function(e) {
            document.getElementById("admin-topics-list").innerHTML =
                "<div style='color:var(--red);font-size:12px;'>Error: " + e.message + "</div>";
        });
    }

    // ── Sign-in log ───────────────────────────────────────────────────────────

    function loadSignInLog() {
        var listEl = document.getElementById("signin-log-list");
        listEl.innerHTML = "<div style='color:var(--muted);font-size:12px;'>Loading…</div>";

        fetch(API + "/api/admin/signin-log", {
            method: "GET", credentials: "include", headers: buildHeaders({})
        })
        .then(function(r) { return r.json(); })
        .then(function(list) {
            listEl.innerHTML = "";
            if (!Array.isArray(list) || !list.length) {
                listEl.innerHTML = "<div style='color:var(--muted);font-size:12px;padding:20px 0;text-align:center;'>No sign-ins recorded.</div>";
                return;
            }
            for (var i = 0; i < list.length; i++) {
                (function(item) {
                    var t   = new Date(item.timestamp).toLocaleString([], { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit", second:"2-digit" });
                    var geo = item.geo || {};
                    var loc = [geo.city, geo.region, geo.country].filter(Boolean).join(", ") || "Unknown";
                    var isp = geo.isp || geo.org || "";

                    var row = document.createElement("div");
                    row.style.cssText = "background:var(--bg);border:1px solid var(--border);border-left:3px solid " +
                        ((geo.proxy || geo.hosting) ? "var(--red)" : "var(--green)") +
                        ";padding:8px 10px;";

                    var top = document.createElement("div");
                    top.style.cssText = "display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px;";
                    top.innerHTML =
                        "<span style='font-weight:700;font-size:12px;color:var(--blue);cursor:pointer;' onclick='document.getElementById(\"lookupUser\").value=\"" + escAttr(item.userId) + "\";investigateUser();'>@" + escHtml(item.userId) + "</span>" +
                        "<span style='font-size:11px;font-family:inherit;color:var(--text);'>" + escHtml(item.ip || "") + "</span>" +
                        (geo.proxy  ? "<span style='font-size:10px;color:var(--red);border:1px solid var(--red);padding:1px 5px;font-weight:700;'>PROXY</span>"   : "") +
                        (geo.hosting ? "<span style='font-size:10px;color:var(--yellow);border:1px solid var(--yellow);padding:1px 5px;font-weight:700;'>HOSTING</span>" : "") +
                        "<span style='font-size:10px;color:var(--muted);margin-left:auto;'>" + t + "</span>";

                    var detail = document.createElement("div");
                    detail.style.cssText = "font-size:11px;color:var(--muted);";
                    detail.textContent = loc + (isp ? " · " + isp : "");

                    row.appendChild(top);
                    row.appendChild(detail);
                    listEl.appendChild(row);
                })(list[i]);
            }
        })
        .catch(function(e) {
            document.getElementById("signin-log-list").innerHTML =
                "<div style='color:var(--red);font-size:12px;'>Error: " + e.message + "</div>";
        });
    }

    // ── Strikes leaderboard ───────────────────────────────────────────────────

    function loadLeaderboard() {
        var el = document.getElementById("leaderboard-list");
        el.innerHTML = "<span style='color:var(--muted);'>Loading…</span>";

        fetch(API + "/api/admin/strikes-leaderboard", {
            method: "GET", credentials: "include", headers: buildHeaders({})
        })
        .then(function(r) { return r.json(); })
        .then(function(list) {
            el.innerHTML = "";
            if (!Array.isArray(list) || !list.length) {
                el.innerHTML = "<span style='color:var(--muted);'>No strikes recorded.</span>";
                return;
            }
            for (var i = 0; i < list.length; i++) {
                var row = document.createElement("div");
                row.className = "lb-row";
                row.innerHTML =
                    "<span class='lb-user'>" + (i + 1) + ". " + list[i].username + "</span>" +
                    "<span class='lb-count'>" + list[i].strikes + " strike" + (list[i].strikes === 1 ? "" : "s") + "</span>";
                (function(u) {
                    row.style.cursor = "pointer";
                    row.title = "Look up " + u;
                    row.onclick = function() {
                        document.getElementById("lookupUser").value = u;
                        investigateUser();
                    };
                })(list[i].username);
                el.appendChild(row);
            }
        })
        .catch(function(e) {
            document.getElementById("leaderboard-list").innerHTML =
                "<span style='color:var(--red);'>Error: " + e.message + "</span>";
        });
    }
</script>
</body>
